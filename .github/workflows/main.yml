
name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android

      # 🔥 التغيير الجوهري: إنشاء مجلد dist بدلاً من www
      - name: Force Create Web Assets (dist)
        run: |
          mkdir -p dist
          echo '<!DOCTYPE html><html><body style="background:#000;color:#fff;text-align:center;"><h1>Tfaarj IPTV Launcher</h1></body></html>' > dist/index.html

      # 🔥 المزامنة: مسح الأندرويد القديم لضمان نظافة الإعدادات الجديدة
      - name: Capacitor Sync
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Repair Gradle Wrapper
        run: |
          cd android
          gradle wrapper
          chmod +x gradlew

      - name: Setup App Logo
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          cp assets/logo.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png || echo "Logo not found"

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tfaarj-IPTV-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk
