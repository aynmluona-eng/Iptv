name: Build Android App (Capacitor)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK & AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Fix and Sync Android Project
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
          rm -rf android/app/src/main/res/mipmap-*
          npm install @capacitor/assets --save-dev
          
      - name: Repair Assets
        run: |
          npm install sharp@0.32.6
          node -e "const sharp = require('sharp'); const fs = require('fs'); async function repair(file) { if (fs.existsSync(file)) { try { const buffer = fs.readFileSync(file); await sharp(buffer).png().toFile(file + '.fixed.png'); fs.renameSync(file + '.fixed.png', file); console.log('Fixed ' + file); } catch(e) { console.log('Failed ' + file); const w = file.includes('splash') ? 2732 : 1024; await sharp({ create: { width: w, height: file.includes('splash') ? 2732 : 1024, channels: 4, background: { r: 0, g: 0, b: 0, alpha: 1 } } }).png().toFile(file); } } } async function run() { await repair('assets/icon.png'); await repair('assets/splash.png'); await repair('assets/icon-foreground.png'); await repair('assets/icon-background.png'); } run();"

      - name: Generate Android Icons
        run: |
          npx @capacitor/assets generate --android
          if [ ! -d "android/app/src/main/res/mipmap-mdpi" ]; then
            echo "Error: Icons were not generated. Check assets folder."
            exit 1
          fi
          npx cap sync android

      - name: Set executable permissions and fix Gradle wrapper
        run: |
          chmod +x android/gradlew
          cd android && gradle wrapper --gradle-version 8.14.3

      - name: Build APK (Debug)
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Build AAB (Debug)
        working-directory: ./android
        run: ./gradlew bundleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-aab
          path: android/app/build/outputs/bundle/debug/app-debug.aab
