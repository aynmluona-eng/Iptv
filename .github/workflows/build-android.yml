name: Build Android App (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Signed APK & AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # No NPM cache to ensure fully clean build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          # No Gradle cache

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Prepare Capacitor Assets
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android @capacitor/assets --save-dev
          rm -rf android/app/src/main/res/mipmap-*
          
      - name: Generate Android Icons
        run: |
          npm install sharp@0.32.6
          node generate_png.js || true
          npx @capacitor/assets generate --android || true
          npx cap sync android

      - name: Set executable permissions and configure Gradle
        run: |
          chmod +x android/gradlew
          cd android && gradle wrapper --gradle-version 8.14.3
          
      - name: Generate Keystore
        id: build_keystore
        run: |
          cd android/app
          keytool -genkey -v -keystore release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass "android123" -keypass "android123" -dname "CN=React App, OU=App, O=App, L=City, ST=State, C=US"

      - name: Build Signed APK
        working-directory: ./android
        run: ./gradlew assembleRelease --no-daemon --no-build-cache -Pandroid.injected.signing.store.file=release.keystore -Pandroid.injected.signing.store.password=android123 -Pandroid.injected.signing.key.alias=release -Pandroid.injected.signing.key.password=android123

      - name: Build Signed AAB
        working-directory: ./android
        run: ./gradlew bundleRelease --no-daemon --no-build-cache -Pandroid.injected.signing.store.file=release.keystore -Pandroid.injected.signing.store.password=android123 -Pandroid.injected.signing.key.alias=release -Pandroid.injected.signing.key.password=android123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
