name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android

      # 🔥 حل مشكلة المجلد المفقود: إنشاء مجلد www ووضع ملف index فيه
      - name: Prepare Web Assets
        run: |
          mkdir -p www
          echo '<!DOCTYPE html><html><head><title>Tfaarj IPTV</title></head><body style="background:#000;color:#fff;"><h1>Tfaarj IPTV Ready</h1></body></html>' > www/index.html

      # 🔥 حل مشكلة "platform already exists": المزامنة فقط وإذا فشلت يتم الإصلاح
      - name: Capacitor Sync
        run: |
          npx cap sync android || (rm -rf android && npx cap add android && npx cap sync android)

      - name: Setup App Logo
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          cp assets/logo.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png || echo "Logo not found"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tfaarj-IPTV-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk
