name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً من GitHub Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. إعداد Java (مطلوب لبناء أندرويد)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # 3. إعداد Node.js مع تفعيل الـ Cache لتسريع التثبيت
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 4. تثبيت المكتبات (Dependencies)
      - name: Install dependencies
        run: npm ci # أفضل من npm install في بيئة GitHub Actions لضمان مطابقة النسخ

      # 5. بناء نسخة الويب (Web Assets)
      - name: Build web app
        run: npm run build --if-present

      # 6. إعداد Capacitor وتحديث منصة أندرويد
      # ملاحظة: تم إضافة 'add' في حال لم يكن المجلد مرفوعاً و 'sync' للتحديث
      - name: Capacitor Sync
        run: |
          npx cap sync android || (npx cap add android && npx cap sync android)

      # 7. بناء ملف الـ APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 8. رفع ملف الـ APK كـ Artifact لتحميله
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
